server:
  port: 8080

spring:
  application:
    name: zhuxian-wiki
  servlet:
    encoding:
      charset: UTF-8
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhuxian_wiki?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&maxAllowedPacket=16777216
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zhuxianwiki.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# AI配置
ai:
  api-url: https://api.minimaxi.com/v1/text/chatcompletion_v2
  api-key: sk-cp-1QL09OOi5d9rUmiiqyqYuIEOuAGjgLBIGg9OjtqXKXAc0VUmaa_3GvKEBgaMIndKzax_sPBDgI6H6bXQUDylobJfbd9I3nCzD_XDcBPw4mXfJ2kBbUlsttk
  model: MiniMax-M2.5
  max-tokens: 4000
  temperature: 0.7

# JWT配置
jwt:
  secret: zhuxian-wiki-secret-key-2024-springboot3
  expiration: 86400000

# 分页配置
page:
  default-size: 10
  default-current: 1
